<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>39 객체 추가설명</title>
	<script>
		var ob = {
							abc:10,
							def:20,
							"문자":22 //키값에는 식별자 또는 문자열을 사용하여 구현가능
		}
	
		// 객체안의 속성 접근시 도트(.)가 아닌
		// 대괄호[]로 호출이 가능하다.
		console.log("ob.abc:" + ob.abc);
		console.log("ob[\"abc\"]:" + ob["abc"]);

		console.log("ob.문자:" + ob.문자);
		console.log("ob[\"문자\"]:" + ob["문자"]);

		//객체안의 속성 추가
		ob.ghi = 30;

		//객체안의 속성 제거
		delete ob.abc;
		delete(ob.def);

		//객체안의 속성 확인(in예약어 : 출력-논리값)
		console.log("abc" in ob); //키값은 ""('')로 묶어준다.
		console.log("def" in ob);
		console.log("ghi" in ob);
		console.log("문자" in ob);

		var aa = "전역변수:aa";
		var ghi = "전역변수:ghi";

		//with문 : 특정한 객체안의 속성을 보다 쉽게 접근할 수 있다.
		with(ob){
			console.log(ghi); //ob.ghi
			console.log(문자); //ob.문자
			console.log(aa); //전역변수호출
			console.log(window.ghi); //전역변수호출
		}
	</script>
</head>
<body>
	
</body>
</html>
