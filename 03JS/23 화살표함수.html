<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>23 화살표함수(p361)</title>
	<script>
		//함수선언(함수표현식)
		let mul1 = function(x,y){	//익명함수
			return x*y;
		}
		
		//함수호출
		console.log(mul1(10,5));

		//화살표 함수
		let mul2 = (x,y) => x*y;
		console.log(mul1(10,2));

		//함수선언
		let avg1 = function(x,y){
			let result = (x+y)/2;
			return result;
		}

		//화살표함수s
		let avg2 = (x,y) => {
			let result = (x+y)/2;
			return result;
		}

		//함수호출
		console.log(avg1(10,5));
		console.log(avg2(7,5));


	</script>
</head>
<body>
	
</body>
</html>
