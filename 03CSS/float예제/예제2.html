<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>예제2</title>
	<style>
		*{margin:0; padding:0;}

		body{background:url("예제2.png") no-repeat;}

		div{border:10px solid #000; margin:50px;
			width:300px; height:300px;}

		p{width:100px; height:100px; float:left;}
		p:nth-child(1){background:#ff0000;}
		p:nth-child(2){background:#00ff4c;}
		p:nth-child(3){background:#00fff7;}
		p:nth-child(4){background:#ffff00; clear:both;}
		p:nth-child(5){background:#001aff;}
		p:nth-child(6){background:#ff00f2;}
		p:nth-child(7){background:#ff9d00; clear:both;}
		p:nth-child(8){background:#d0ff00;}
		p:nth-child(9){background:#ff00a6;}
	</style>
</head>
<body>
	<div>
		<p></p>
		<p></p>
		<p></p>
		<p></p>
		<p></p>
		<p></p>
		<p></p>
		<p></p>
		<p></p>
	</div>
</body>
</html>
