<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>12 조건문과 스위치문 예제</title>
	<script>
		/*
			1.현재 월을 입력받아서, 변수에 저장하기
			2.입력받은 숫자가 1~12사이면, 화면에 "입력한 월 : 1월"이라고 출력
			3.잘못된 값을 입력한 경우 "잘못된 값을 입력하였습니다."라고 출력
		*/

		let month = prompt("현재 월을 입력하세요."); //"5"

		let answer = (month >= 1) && (month <= 12); // 1~12

		if(answer) document.write("<h1>입력한 월 : "+month+"월</h1>");
		else document.write("<h1>잘못된 값을 입력하였습니다.</h1>");

		/*계절출력(사계절) - switch문 활용*/
		switch(month){
			case "3": case "4": case "5":
				document.write(`<p>${month}월은 봄입니다.</p>`); 
				break;
			case "6": case "7": case "8":
				document.write(`<p>${month}월은 여름입니다.</p>`); 
				break;
			case "9": case "10": case "11":
				document.write(`<p>${month}월은 가을입니다.</p>`); 
				break;
			case "12": case "1": case "2":
				document.write(`<p>${month}월은 겨울입니다.</p>`); 
				break;
			default:
				document.write("<p>계절을 알 수 없습니다.</p>"); 
		}

		let number = parseInt(month); //문자("5")를 정수(5)로 반환함.

		/*말일출력*/
		switch(number){
			case 1: case 3: case 5: case 7: case 8: case 10: case 12:
				document.write(`<p>${number}월은 31일까지 있습니다.</p>`);
				break;
			case 4: case 6: case 9: case 11: 
				document.write(`<p>${number}월은 30일까지 있습니다.</p>`);
				break;
			case 2:
				document.write(`<p>${number}월은 28일 또는 29일까지 있습니다.</p>`);
				break;
		}



	</script>
</head>
<body>
	
</body>
</html>
