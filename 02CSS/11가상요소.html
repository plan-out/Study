<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>11가상요소</title>
	<style>
		#box1{border:5px solid #000; display:none;}
		#box1::before{content:"비포";}
		#box1::after{content:"에프터";}
		span:nth-child(1){background:#fcc;}
		span:nth-child(2){background:#cfc;}
		span:nth-child(3){background:#ccf;}

		#box2{border:5px solid #000; display:none;}
		#box2::before{content:"비포";
			background:#f00;
			width:100px; height:50px;
			display:block;}
		#box2::after{content:"에프터";
			width:150px; height:50px;
			background:url("../html/자몽.jpg") center center/cover;
			display:block;}
		p{width:150px; height:50px;}
		p:nth-child(1){background:#fcc;}
		p:nth-child(2){background:#cfc;}
		p:nth-child(3){background:#ccf;}
	</style>
</head>
<body>
	<div id="box1">
		<!--#box1::before 영역생성-->
		<span>인라인태그1</span>
		<span>인라인태그2</span>
		<span>인라인태그3</span>
		<!--#box1::after 영역생성-->
	</div>
	<hr/>
	<div id="box2">
		<p>블록태그1</p>
		<p>블록태그2</p>
		<p>블록태그3</p>
	</div>
	<hr/>
	<style>
		#box3, #box4{border:10px solid #000;}
		.clearfix::after{content:""; /*content속성 반드시 있어야함.*/
			display:block; clear:both;
			background:#cff;}		
		section{width:100px; height:100px; 
			border:1px solid #ff0; float:left;}
		section:nth-child(1){background:#fcc;}
		section:nth-child(2){background:#cfc;}
		section:nth-child(3){background:#ccf;}
	</style>
	<div id="box3" class="clearfix">
		<section>영역</section>
		<section>영역</section>
		<section>영역</section>	
		<!--에프터-->
	</div>
	<hr/>
	<div id="box4" class="clearfix">
		<section>영역</section>
		<section>영역</section>
		<section>영역</section>	
	</div>
</body>
</html>
