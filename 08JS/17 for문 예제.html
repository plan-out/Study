<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>17 for문 예제</title>
	<script>	
		/*예제1*/
		for(var a=0; a<5; a++){
			for(var b=0; b<(5-a); b++){
				document.write("◆");
			}
			document.write("<br>");
		}
		document.write("<hr>");
		/*예제2*/
		for(var c=0; c<6; c++){
			for(var d=0; d<(5-c); d++){
				document.write("◆");
			}
			for(var e=0; e<c; e++){
				document.write("◇");
			}
			document.write("<br>");
		}

	</script>
</head>
<body style="font-size:36px; line-height:1;">


</body>
</html>
