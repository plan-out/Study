<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>10 inline-block요소의 수직정렬</title>
	<style>
		div{
			border:10px solid #ff0;
			font-size:80px;
		}
		img{
			width:400px;
			vertical-align:top;
		}
	</style>
</head>
<body>
	<div>
		text<img src="../html/자몽.jpg">jpg
	</div>	
	<!--
		텍스트와 inline요소들은 baseline을 기준으로 수평정렬된다.

		vertical-align 속성 :  inline-block요소의 수직위치를 조정
			:baseline; (기본값) 텍스트가 나열되는 수평라인에 맞추어 정렬됨.
			:top;  행높이를 기준하여 위에 정렬됨
			:bottom; 행높이를 기준하여 아래에 정렬됨
			:middle; 가운데에 정렬됨.
			:text-top; 텍스트크기를 기준하여 위에 정렬됨.
			:text-bottom; 텍스트크기를 기준하여 아래에 정렬됨.
			:sub; 아래첨자 위치에 표시
			:super; 윗첨자 위치에 표시
			:수치px; 입력된 수치만큼 baseline에서 이동됨.
	-->
</body>
</html>
