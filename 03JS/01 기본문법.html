<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>01 기본문법</title>
	<!--외부 CSS문서 연결-->
	<link href="style.css" rel="stylesheet">

	<!--html문서 내부에 스타일 작성-->
	<style>
		/*CSS작성*/
		body{background:#ffc;}
	</style>

	<!--외부 JS문서 연결-->
	<script src="script.js"></script>

	<!--html문서 내부에 스크립트 작성-->
	<script>
		/*JS작성*/
		document.write("자바스크립트 시작!!"); //한줄주석
		
	</script>
</head>
<body>
	<!--태그안에 속성으로 스타일 작성:인라인스타일-->
	<h1 style="color:red;">JS기본문법(p310~p314)</h1>

	<!--태그에 스크립트를 작성하는 방법-->
	<!--(1) 링크태그의 url부분을 스크립트로 작성할 수 있다.-->
	<a href="javascript:alert('경고창!!')">경고창표시</a>
	<!--(2) 이벤트관련 속성을 사용하여 스크립트를 작성할 수 있다.-->
	<img alt="" style="width:100px;" src="../HTML/자몽.jpg"
			onmouseover="this.src='../레몬.png'"
			onmouseout="this.src='../HTML/자몽.jpg'"	/>

	<script src="script2.js"></script>
	<script>
		document.write("<p>body안 맨마지막에 작성!!</p>");
		document.write("<p>안녕하세요.</p>");
		/*
			스크립트의 경우, 문서의 하단에 작성되는 경우가 많다.
			이유는,
			html요소가 선행되어 처리되어야지,
			작성된 html요소를 사용하여 스크립트를 만들 수 있기 때문이다.
		*/
	</script>
</body>
</html>
