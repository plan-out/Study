<!DOCTYPE html>
<html lang="ko" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>예제1</title>
    <style>
    *{margin:0; padding:0;}
    img{vertical-align:top;}

    body{height:2000px;
		background:url("img1/chicken.png") no-repeat right top fixed #F5EDE3 ;}

    #character{width:331px; outline:5px solid #000;
		position:fixed; top:50%; left:50%;
		margin-left:-165.5px; margin-top:-141.5px;}

    .eye{position:absolute; top:140px; left:94px;}
    .hair{position:absolute; top:-125px; left:90px;}
    </style>
  </head>
  <body>
    <div id="character">
    	<p><img src="img1/face.png"/></p>  
      <p class="eye"><img src="img1/eye.png"/></p>
      <p class="hair"><img src="img1/hair.png" alt=""></p>
    </div><!--//character-->
  </body>
</html>
