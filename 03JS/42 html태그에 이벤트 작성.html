<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>42 html태그에 이벤트 작성(p404)</title>
</head>
<body onload="bodyBg()">
	<h1>html 태그에 이벤트 작성</h1>
	<hr/>	
	<p ondblclick="alert('경고창!!!')">경고창 띄움</p>
	<hr/>	
	<p onmouseenter="this.style.background='pink'"
		 onmouseleave="this.style.background='cyan'">
		 	마우스를 올리면 색변경</p>
	<hr/>
	<img src="../레몬.png" width="200"
			 onmouseover="this.src='../HTML/자몽.jpg'"
			 onmouseout="this.src='../레몬.png'" /> 		
	<hr/>
	
	<script>
		function bodyBg(){
			document.body.style.backgroundColor = "#ffc";
		}
	</script>
</body>
</html>
