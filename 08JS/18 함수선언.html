<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>18 함수선언(p353-356)</title>
	<script>
		/*
			함수(function) : 일렬의 처리과정(실행문)을 묶어놓고, 이름을 부여한 것
			- 필요할 때 호출하여, 사용하기 위함.
			- 반복하여 사용할 수 있다.
			- 인수값에 따라 다른 결과물을 만들 수 있다.
		*/

		//함수호출
		make();
		//noodle(); 함수표현식보다 먼저 호출될 수 없다.


		//함수선언(함수선언식)
		function make(){
			console.log("1.종이컵이 나온다.");
			console.log("2.커피가루가 나온다.");
			console.log("3.온수가 나온다.");
			console.log("4.완료불빛이 켜진다.");
		}
		
		//함수선언(함수표현식);
		var noodle = function(){ //익명함수 : 이름이 없는 함수
			console.log("a.물을 끓인다.");
			console.log("b.면을 삶는다.");
			console.log("c.스프를 넣는다.");
			console.log("d.계란을 넣는다.");
		}


		//함수호출
		make();
		noodle();
		console.log("==================");
		make();
		noodle();

		//자가실행함수(즉시 실행 함수p356)
		;(function(){
			console.log("자가실행함수!!");
		})();



	</script>
</head>
<body style="font-size:30px;">
	<a href="javascript:make()">버튼</a>	
</body>
</html>
