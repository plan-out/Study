<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>16 애니메이션</title>
	<style>
		@keyframes play{
			from{background:green;}
			to{background:red; color:yellow;}
		}

		h2{padding:10px; background:blue;
			color:#fff;
			animation-name:play; /*진행할 애니메이션 지정*/
			animation-duration:3s; /*재생시간*/
			animation-iteration-count:infinite;
				/*반복횟수(infinite:무한반복)*/
		}

		@keyframes ani{
			0%{transform:translate(100px,100px); background:yellow;}
			20%{transform:translate(200px,100px); }
			40%{transform:translate(200px,200px); }
			60%{transform:translate(100px,200px); }
			80%{transform:translate(100px,300px); }	
			100%{transform:translate(200px,300px); background:pink;}
		}

		#this{width:50px; height:50px;
			background:gray;
			animation-name:ani;	/*애니메이션지정*/
			animation-duration:5s; /*재생시간*/
			animation-timing-function:steps(4,start); /*구간별속도*/
			/* arof.kr/속도비교.html */
			animation-delay:3s;	/*대기시간*/
			animation-iteration-count:5;	/*반복횟수*/
			animation-direction:alternate; /*재생방향*/
			/*reverse(역방향), alternate(정-역), 
				alternate-reverse(역-정)*/
			animation-fill-mode:both;	/*스타일 적용*/
			/*forwards(완료후), backwards(대기중), 
			both(둘다)*/

			/*
			축약표현
			animation:이름 재생시간 [속도] [대기시간] [반복횟수] [방향] [스타일];
			*/
			animation:ani 3s linear 0s infinite alternate;
		}

		#this:hover{
			animation-play-state:paused; /*재생상태*/
			/*running(재생중), paused(일시정지)*/
		}
	</style>
</head>
<body>
	<h2>css : animation</h2>
	<p>시간에 흐름에 따라 여러 스타일로 점식적으로
	변화하는 애니메이션을 생성한다.</p>
	<div id="this"></div>
</body>
</html>
