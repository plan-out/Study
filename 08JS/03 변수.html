<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>03 변수(p315~318)</title>
	<script>
		/*
			변수(variable) : 특정한 값(데이타)을 저장하기 위한 수(=저장공간)
				- 사전적의미 : 1.변동이 심한; 가변적인; 2.변화를 줄 수 있는
											3.변수
		*/

		var a; //a라는 변수를 생성함.
		a = 10; //변수a에 값10을 넣음.(=저장함.)

		console.log("콘솔창에 출력!!");
		console.log(a); //변수a의 값을 호출
		console.log("a"); //"a" → 문자열
		console.log(a+2); //12

		a = 20; //변수a에 값을 20으로 변경함.

		console.log("변경된 값 출력!!");
		console.log(a+5);

		var b = 5; //변수b를 선언(=생성)하고, 값(5)를 넣음.

		console.log(a+b+2); //20+5+2 = 27
 
		var c,d; //변수c와 변수d를 선언
		var e,f=8,g; //변수e, 변수f, 변수g를 선언
			//변수f에만 값(8)을 넣음.

		/*
			변수명(식별자) 선정시 주의사항
			(1) 띄어쓰기 할 수 없다.
			(2) 첫 글자는 영문 또는 "_","$" 만 가능하다.
			(3) 예약어는 사용할 수 없다.
			※식별자 : 사용자(개발자)가 붙이는 이름
			※예약어 : 특별한 용도를 가지는 키워드(var)
		*/	
	</script>
</head>
<body>
	
</body>
</html>
