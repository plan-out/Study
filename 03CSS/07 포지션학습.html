<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>07 포지션학습</title>
	<style>
		body{height:3000px;}
		div{width:200px; height:80px;
			border:1px solid #000; background:#999;
			color:#fff; font-size:24px;}
			
		#b{background:#f00;
			position:fixed;
			top:30px; left:30px;
			z-index:-1;}
			
		#d{background:#0f0;
			position:absolute;
			top:60px; left:60px;
			z-index:2;}
				
		#f{background:#00f;
			position:absolute;
			top:90px; left:90px;
			z-index:2;}	

		#h{background:#880;
			position:relative;
			top:50px; left:50px;}

		section{border:10px solid #000; height:1500px;
			}

		#j{background:#0ff; position:sticky;
			top:0; left:0;}
	</style>
</head>
<body>
	<div id="a">a</div>
	<div id="b">b(fixed)</div>
	<div id="c">c</div>
	<div id="d">d(absolute)</div>
	<div id="e">e</div>
	<div id="f">f(absolute)</div>
	<div id="g">g</div>
	<div id="h">h(relative)</div>
	<div id="i">i</div>

	<section>
		<div id="j"></div>
	</section>


</body>
</html>
