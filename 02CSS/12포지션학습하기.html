<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>12포지션학습하기</title>
	<style>
		body{height:3000px;}
		div{width:160px; height:80px;
			border:1px solid #000; background:#999;
			color:#fff;font-size:24px;}
		
		#d{background:#0f0;
			position:absolute;
			z-index:1;
			top:60px; left:60px;}

		#b{background:#f00;
			position:fixed;
			z-index:1;
			top:30px; left:30px;}
				
		#f{background:#00f;
			position:absolute;
			z-index:2;
			top:90px; left:90px;}

		#h{background:#ff0;
			position:relative;
			top:30px; left:30px;}

		#c{background:#0ff;
			position:sticky;
			top:30px; left:300px;}
	</style>
</head>
<body>
	<div id="a">A</div>
	<div id="b">B(fixed)</div>
	<div id="c">C(sticky)</div>
	<div id="d">D(absolute)</div>
	<div id="e">E</div>
	<div id="f">F(absolute)</div>
	<div id="g">G</div>
	<div id="h">H(relative)</div>
	<div id="i">I</div>
	<div id="j">J</div>
	<div id="k">k</div>
</body>
</html>
