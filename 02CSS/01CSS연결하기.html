<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>01CSS연결하기</title>
	<!--
		외부문서 css연결
		: <link>를 사용하여 외부 css문서를 연결할 수 있다.
			- href속성 : 연결하는 css문서를 지정한다.
			- rel속성 : 연결하는 대상의 타입을 지정한다.
	-->	
	<link href="스타일.css" rel="stylesheet">
</head>
<body>
	<h1>CSS(Cascading Style Sheets)</h1>
	<p>: 웹문서를 꾸미기 위한 정보(태그의 스타일)</p>
	<hr size="5" color="red"/>
	<div>
		<h2>CSS 사용하는 이유</h2>
		<ol>
			<li>표현할 수 있는 스타일이 다양하고, 세분화 되어 있다.</li>
			<li><strong>구조와 스타일을 분리</strong>하여 작성할 수 있다.</li>
		</ol>
	</div>
</body>
</html>
