<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>14 트랜지션</title>
	<style>
		#this{width:100px; height:100px;
			background:red;
			transition-property:all;		/*전환속성(all:모든속성)*/
			transition-duration:2s;			/*전환시간*/
			transition-timing-function:ease;	/*전환속도*/
			/*
				:ease; (기본값) 느리게 → 빠르게 → 느리게
				:liner; 처음과 끝이 동일한 속도
				:ease-in; 느리게 → 빠르게
				:ease-out; 빠르게 → 느리게
				:ease-in-out; 느리게 → 빠르게 → 느리게(esas 변폭이 크다)
			*/
			transition-delay:2s;  	/*대기시간*/
			
			/*
				단축(축약)속성
				transition:전환속성 전환시간 [속도] [대기시간];
			*/
			transition:all 3s linear 1s;
		}
		
		#this:hover{background:yellow;
			width:200px; height:200px}	
	</style>
</head>
<body>
	<h2>트랜지션(전환)효과</h2>
	<p>:CSS 동적표현 효과, 기존 스타일에서 다른 스타일로 부드럽게 
		변화시키는 효과</p>
	<div id="this"></div>
</body>
</html>
