<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>03 변수(p315~318)</title>
	<script>
		/*
			변수(variable) : 특정한 값(데이타)을 저장하기 위한 수(=저장공간)
				- 사전적의미:1.변동이 심한; 가변적인; 2.변화를 줄 수 있는
				            3.변수
		*/

		var a;	//a라는 변수를 생성함.
		a = 10;	//변수a에 값10을 넣음.(=저장함.)

		document.write(a);	//괄호안에 변수a의 값을 호출하여 넣음.
		document.write("a");	//괄호안에 문자a을 넣음.
		
		console.log(a); 
		console.log("a");
		console.log(a+2);	//12

		a = 20; //변수a의 값을 변경함.

		console.log(a+5); //25

		var b = 5; //변수b를 선언하고, 값(5)를 넣음(초기화).

		console.log(a+b+10); //20+5+10=35

		var c,d; //변수c와 변수d를 선언
		var e,f=8,g; 	//변수e, 변수f, 변수g를 선언
							 		//변수f에만 값(8)을 넣음.
		/*
			※프로그래밍 언어는 문장단위로 순차적으로 실행/처리된다.

			[식별자 선정시 주의사항]
			(1) 띄어쓰기 할 수 없다.
			(2) 첫 글자는 영문 또는 "_","$" 만 가능하다.
			(3) 예약어는 사용할 수 없다.

			[문장의 구조]
			식별자 : 사용자(개발자)가 붙이는 이름(변수명,함수명,객체명,...);
			예약어 : 특별한 용도를 가진 키워드
							(var,let,const,if, ....)
			연산자(연산기호) 
			문장기호: ";"문장의 마침을 표시함.
			데이타 : 숫자, 문자, 논리값
		*/

		
	</script>
</head>

</body>
</html>
