<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>10 Switch문(p343-344)</title>
	<script>
		/*
			Switch문:값에 따라 코드를 실행시킬 때 사용
		*/

		var num1 = 3;

		switch(num1){
			case 1: console.log("1.실행문");
			case 2: console.log("2.실행문");
			case 3: console.log("3.실행문");
			case 4: console.log("4.실행문");
			case 5: console.log("5.실행문");
			default : console.log("일치하는 값이 없는 경우");
		}

		console.log("==================");

		let num2 = 3;
		let num3 = 5;

		switch(3){
			case 1:
				console.log("실행문--1");
				break; //break예약어:현재 실행문을 중지하고, 블록밖으로 나옴(p350)
			case 2:
				console.log("실행문--2");
				break; 
			case 3:
				console.log("실행문--3.1");
				console.log("실행문--3.2");
				break; 
				console.log("실행문--3.3"); //실행되지않음
			case 4:
				console.log("실행문--4");
				break; 
			default : 
				console.log("일치X : default 내용 출력");
				break; //맨마지막은 안넣어도 됨.
		}//end:switch
	
		console.log("switch문 밖!!!!");

	</script>
</head>

</body>
</html>
