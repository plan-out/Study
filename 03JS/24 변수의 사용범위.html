<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>24 변수의 사용범위(ㅔ363)</title>
	<script>
		/*
			변수는 선언된 위치에 따라 다른 범위를 갖는다.
			[전역변수]:함수밖에서 선언된 변수, 어디서든 호출하여 사용가능하다.
			[지역변수]:함수안에서 선언된 변수, 해당 함수안에서만 사용가능하다.
			[블록변수]:블록내에서만 사용가능한 변수, let으로 선언된 변수
								
			※ const도 블록내에서 선언시, 해당블록안에서만 사용되어짐.
			  보통의 상수의 경우, 블록밖에서 선언됨.
		*/

		var num1 = 11; //전역변수
		let num2 = 22; //전역변수
		var num3 = 33; //전역변수
		let num4 = 44; //전역변수
		const NUM = 1000; //상수는 전역변수와 같은 위치에 작성한다.
		
		//함수선언
		function life(x=20){
			var n1 = 10 //지역변수
			var num3 = 30; //지역변수(전역변수와 동일한 이름을 가진 변수)
			let num4 = 40; //지역변수(전역변수와 동일한 이름을 가진 변수)
			num5 = 55;//예약어 없이 변수선언시, 전역변수로 선언됨.
			console.log("num1:"+num1);
			console.log("num2:"+num2);
			console.log("n1:"+n1);
			console.log("매개변수x:"+x);
			//지역변수와 동일한 이름인, 전역변수 사용시, "this"로 접근한다.
			console.log("num3:"+this.num3);
			//let으로 선언된 전역변수는 접근할 수 없다.
			console.log("num4:"+this.num4); //정의되지않음.
		}

		//함수가 아닌, 블록안에서 변수선언(제어문 사용시)
		{
			var aa = 123; //전역변수
			let bb = 456;	//블록변수
			const CC = 789; //블록상수
			console.log(`블록안 aa:${aa}, bb:${bb}, CC:${CC}`);
		}
		console.log(`블록밖 aa:${aa}`);
		//console.log(`블록밖 bb:${bb}`); - 블록영역밖에서는 호출할 수 없다.
		//console.log(`블록밖 CC:${CC}`); - 블록영역밖에서는 호출할 수 없다.

		console.log("<<<<<함수호출>>>>>");
		life();

		console.log("<<<<<변수호출>>>>>");
		console.log("num1:"+num1);
		console.log("num2:"+num2);
		console.log("num5:"+num5);
		//console.log("n1:"+n1);
		//console.log("매개변수x:"+x);
	</script>
</head>
<body>
	
</body>
</html>
