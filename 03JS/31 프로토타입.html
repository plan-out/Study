<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>31 프로토타입(p378)</title>
	<script>
		/*
			프로토타입(객체의 원형(틀)) : 자바스크립트에만 있는 개념
		*/

		//생성자 함수
		function Rectangle(w=0, h=0){
			this.width = w;
			this.height = h;
		}

		//메소드추가
		Rectangle.prototype.getArea = function(){
			console.log("상자의 넓이:"+(this.width * this.height));
		}

		var box1 = new Rectangle(100,50);		
		box1.getArea();

		var box2 = new Rectangle(75,40);
		box2.getArea();

		console.log(box1);
		console.log(box2);
	</script>
</head>

</body>
</html>
