<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>08 조건문-if문(p340-343)</title>
	<script>
		/*
			제어문:실행문의 순서를 제어하거나 반복시키는 문법
				-조건문(if, switch), 반복문(while, for)						
		*/

		//프로그래밍은 문장단위로 실행되며, 순차적으로 호출된다.

		let a = 10;
		/*조건문(if문) : 조거을 만족하면(true), 실행시킴.*/
		console.log("실행문1");
		if(true) console.log("실행문2");
		if(false) console.log("실행문3");
		if(a>10) console.log("실행문4");
		console.log("실행문5");
		if(false){//블록:여러개의 실행문을 묶어서 제어할 수 있다.
			console.log("실행문6");
			console.log("실행문7");
			console.log("실행문8");
		}
		console.log("실행문9");

		/*조건분기문(if ~ else ~ )
			: 조건의 결과에 따라, 두가지 경우중 하나만 실행
			  조건이 참일때 실행하는 것과, 거짓일때 실행하는 것
				두가지를 작성한다.*/
		if(true) console.log("조건이 참인 경우 실행!!");
		else console.log("조건이 거짓인 경우 실행!!");

		var num = 16;
		/*
			num%2 = 0 or 1
			0 == 0 → true
			1 == 0 → false
		*/
		if((num%2)==0) console.log("num은 짝수입니다.");
		else console.log("num은 홀수입니다.");

		var hour =16;

		if(hour<=12){
			console.log("좋은 아침입니다.");
			console.log("오전 "+hour+"시 입니다.");
		}else{
			hour -= 12;
			console.log("점심식사는 하셨나요??");
			console.log(`오후 ${hour}시 입니다.`);
		}

		/*다중 if문:if문을 중첩하여 사용*/
		if(false) console.log("첫번째 조건이 참!!");
		else if(true) console.log("첫번째 조건은 거짓, 두번째 조건은 참");
				 else if(true) console.log("1,2번 조건 거짓, 3번 조건 참");
				 		  else console.log("모든 조건이 거짓!!");



	</script>
</head>
<body>
	
</body>
</html>
