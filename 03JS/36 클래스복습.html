<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>36 클래스복습</title>
	<script>
		/*
			사용자정의객체 생성방법
			(1) 객체리터럴을 표현식을 사용하여 생성
					ex) var obj = {};
					-동일한 구조의 객체를 반복생성할 수 없다.
			(2) 생성자함수를 통해 객체를 생성	
			(3) 클래스를 통해 객체를 생성	
					- 되도록, (2)번 방법보다 (3)번 방법을 사용
					- ES6추가
					- 상속, 캡슐화, 다형성에 좋다
		*/

		//생성자함수만 정의함.
		function Dog(){
			this.name = null;
		}

		//객체생성
		var d1 = new Dog();
		var d2 = new Dog();

		//클래스정의
		class Car{
			number = null;
		}

		//객체생성
		var c1 = new Car();
		var c2 = new Car();

	</script>
</head>
<body>
	
</body>
</html>
