<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>09 인라인 블록의 수직정렬</title>
	<style>
		div{font-family:"Gabriola"; border:1px solid #f00;
			font-size:40px; }
		img{width:200px; vertical-align:top;}
		/*
			vertical-align : 수직정렬기준변경	
				:baseline; (기본값) - 글자가 나열되는 라인
				:top; - 행높이를 기준하여 위에 배치
				:bottom; - 행높이를 기준하여 아래에 배치
				:middle; - 행높이를 기준하여 가운데에 배치
				:10px; - baseline에서 수치만큼 이동되어 배치
		*/
	
	</style>
</head>
<body>
	<div>
		ABC <img src="고양이.png"> jpg
	</div>
</body>
</html>
