<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>15 Flex 학습하기_2번</title>
	<style>
		#container{width:70%; margin:0 auto;
			border:10px solid #000; background:#ffc;}
		#container div{height:100px; border:2px solid #f00;
			background:#cff;}
		#container div span{display:block; height:30px;
			background:blue;}
	</style>
</head>
<body>
	<section id="container">
		<div id="item1"><span style="width:100px;"></span></div>
		<div id="item2"><span style="width:150px;"></span></div>
		<div id="item3"><span style="width:200px;"></span></div>
	</section>
	<style>
		#container{
			display:flex; 
			height:200px; align-items:center;
		}
		#item1{flex-basis:200px; flex-grow:0; flex-shrink:2;}
		#item2{flex-basis:200px; flex-grow:0; flex-shrink:1;}
		#item3{flex-grow:0;}
		/*
			flex-basis:메인축기준 점유 크기(지금은 너비)
			flex-grow : (기본값=0);
				- 늘어나는 여백의 비
			flex-shrink: (기본값=1);
				- 줄어드는 여백의 비
			[한번에 작성]	
			flex:[basis] [glow] [shrink];
		*/
	</style>
</body>
</html>
