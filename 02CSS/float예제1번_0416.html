<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>float예제1번</title>
  <style>
    #parent{border:10px solid #000;
      width:300px; height:300px;}

    #parent div{width:100px; height:100px;
      float:left;}
  </style>
</head>
<body>
  <div id="parent">
    <div style="background:rgb(84, 179, 163);"></div>
    <div style="background:rgb(166, 255, 0);"></div>
    <div style="background:rgb(204, 255, 0);"></div>
    <div style="background:rgb(0, 17, 255);"></div>
    <div style="background:rgb(255, 0, 221);"></div>
    <div style="background:rgb(255, 0, 187);"></div>
    <div style="background:rgb(60, 164, 22);"></div>
    <div style="background:rgb(110, 97, 175);"></div>
    <div style="background:rgb(225, 141, 170);"></div>
  </div>
</body>
</html>
