<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>03 선택자의 유형</title>
	<link href="선택자.css" rel="stylesheet">
</head>
<body>
	<h2>셀렉터의 유형(p100)</h2>
	<p>셀렉터(선택자)란 대상을 구성하는 요소를 뜻함.</p>
	<hr/>
	<div id="a" class="ab">영역태그</div>
	<div id="b" class="ab bc">영역태그</div>
	<div id="c" class="bc">영역태그</div>
	<!--
		id는 해당페이지에서 중복불가하다.
		class는 여러요소가 중복하여 동일한 클래스명을 가질 수 있으며,
		다중으로 클래스를 부여할 수 있다.
		
		[아이디명과 클래스명 선정시 주의사항]
		1. 숫자로 시작하면 안되고, 숫자로만 되어 있어도 안된다.
		2. 띄어쓰기를 하면 안된다.
	-->
</body>
</html>
