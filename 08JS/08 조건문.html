<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>08 조건문 if문(p340-343)</title>
	<script>
		//프로그래밍은 문장단위로 실행되며, 순차적으로 진행된다.

		/*
			제어문:실행문의 순서를 제어하거나, 반복시키는 문법
			- 조건문(if, switch)
			-	반복문(while, do while, for)
			- break(중지), continue(건너뛰기)
		*/

		let a = 10;
		/*조건문(if문) : 조건을 만족하면(true), 실행시킴*/
		console.log("실행문1");
		if(true) console.log("실행문2");
		if(false) console.log("실행문3");
		if(a>10) console.log("실행문4");
		console.log("실행문5");
		if(false){//블록:여러개의 실행문을 묶어서 제어할 수 있다.
			console.log("실행문6");
			console.log("실행문7");
			console.log("실행문8");
		}
		console.log("실행문9");

		/*조건분기문(if ~ else ~)
			:조건의 결과에 따라, 두가지 경우 중 하나만 실행*/
		if(false) console.log("조건이 참!!");	
		else console.log("조건이 거짓!!");	

		var hour = 10;

		if(hour<=12){
			document.write("좋은 아침입니다.<br>");
			document.write("오전 "+hour+"시 입니다.");
		}else{
			hour -= 12; //현재값에 12를 뺀다.
			document.write("식사 맛있게 하세요.<br>");
			document.write(`오후 ${hour}시 입니다.`);
		}

		/*다중 if문:if문을 중첩하여 사용*/
		if(false) console.log("조건1:참");
		else if(false) console.log("조건1:거짓, 조건2:참");
				 else	if(true) console.log("조건1,2:거짓, 조건3:참");
				 		  else console.log("모든 조건:거짓");
	</script>
</head>
<body>
	
</body>
</html>
