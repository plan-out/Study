<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>16 반복문(for)-p348</title>
	<script>
		/*
			while문과 for문 둘다 동일한 기능을 하는 반복문이다
			더 좋고, 나쁨은 없음, 상황에 따라 적절히 사용해야한다.
			대체적으로 for문을 조금 더 선호한다.
		*/

		var a = 1; //변수생성(초기화)
		while(a<=10){	//반복조건
			console.log("while-a:"+a);
			a++;//변화식(증가감식):변수가 반복할때마다 변화되는 식
		}

		//for(변수초기화; 반복조건; 변화식){}문
		for(var i = 1; i<=10; i++){
			console.log("for-i:"+i);
		}

		//반복문의 중첩:반복문안에 또 다른 반복문을 작성하는 형태
		//주로 for문을 사용함.
		for(var j = 1; j<=3; j++){
			console.log(`*****첫번째 for문 j:${j}*****`);
			for(var z = 1; z<=5; z++){
				console.log(`=두번째 for문 z:${z}=`);
			}
			console.log("----------------------------");
		}


	</script>
</head>
<body>
	
</body>
</html>
