<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>float예제3</title>
	<style>
	#wrap{background:#ffc;
		border:10px solid #000;		
		width:900px; height:400px;}
		
	#wrap  > div{
		width:300px; height:300px;
		border-width:10px;
		border-style:solid;
		margin:40px;}	
	
	#red{border-color:red;
		background:#fcc;
		float:left;}
	#green{border-color:green;
		background:#cfc;
		float:right;}
		
	#wrap div div{
		width:100px; height:100px;}
	
	#red div{float:left;}
	#green div{float:right;}
	
	#r4, #r5, #g2, #g3{clear:both;}
	
	#r1, #g1{background:#00f;}
	#r2, #g2{background:#33f;}
	#r3, #g3{background:#66f;}
	#r4, #g4{background:#99f;}
	#r5, #g5{background:#aaf;}
	</style>
</head>
<body>
	<div id="wrap">
		<div id="red">
			<div id="r1">r1</div>
			<div id="r2">r2</div>
			<div id="r3">r3</div>
			<div id="r4">r4</div>
			<div id="r5">r5</div>
		</div>
		<div id="green">
			<div id="g1">g1</div>
			<div id="g2">g2</div>
			<div id="g3">g3</div>
			<div id="g4">g4</div>
			<div id="g5">g5</div>
		</div>
	</div>
</body>
</html>
