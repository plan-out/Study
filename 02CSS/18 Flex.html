<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>18 Flex</title>
	<style>
		.container{border:3px solid #333; background:#0a0;
			width:80%; margin:20px auto;}
		.item{border:3px solid #f00; background:#ff4;
			color:#000; width:100px; height:100px;
			font-size:30px;}
	</style>
</head>
<body>
	<div id="box1" class="container">
		<div class="item">1번</div>
		<div class="item">2번</div>
		<div class="item">3번</div>
		<div class="item">4번</div>
	</div><!--//.container-->
	<style>
		#box1{
			display:flex; height:300px;
			/*display:flex = block과 같다.
				display:inline-flex = inline-block과 같다.*/
			flex-direction:row;
			/*요소가 배치되는 메인축의 방향을 설정
				[row, column, row-reverse, column-reverse*/
			justify-content:center;
			/*메인축기준 요소 정렬*/
			align-items:center;
		}
	</style>
</body>
</html>
