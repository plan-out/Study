<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>29 객체 복습</title>
	<script>
		/*객체 : 여러개의 변수(속성)와 여러개의 함수(메소드)를 저장할 수
						요소 */
				
		//객체생성
		let box = {
								a:10,
								b:5,
								text:function(){console.log("메소드출력!!");}
		};

		//객체안의 내용 호출
		let num = box.a + box.b;
		console.log("num:"+num);
		box.text();

		//객체안에 변수(속성) 추가
		box.c = 2;
		console.log("box.c:"+box.c);

		//객체안에 함수(메소드) 추가
		box.sum = function(x,y){
			return x+y;
		}

		num = box.sum(100,23);
		console.log("num:"+num);

		console.log(box);
		//객체안의 변수(속성) 제거(p374)
		delete box.b;
		console.log(box);
		
		delete box.text; //함수제거는 괄호제외하고 작성
		console.log(box);



		</script>
</head>
<body>
	
</body>
</html>
