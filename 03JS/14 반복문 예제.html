<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>14 반복문 예제</title>
	<script>

		let ans = true;
		let num = 1;

		while(ans){
			document.write("<p>반복문실행:"+(num++)+"</p>");
			ans = confirm("반복하시겠습니까?");
		}

		/*1~100까지 짝수의 합*/
		let i = 1;
		let total = 0;

		while(i<=100){
			if((i%2)==0) total += i; //0+2+4+6+8+....+96+98+100
			i++; //i:1→2→3→4→5→.....→99→100→ 
		}

		document.write(`<p>1~100까지의 짝수합 : ${total}</p>`);
		
		i = 1;
		total = 0;

		while(i<=100){
			total += i; //0+1+3+4+5+....+97+99
			i += 2;	//i의 값은 2씩증가 : 1→3→5→7→9→...
		}	
		
		document.write(`<p>1~100까지의 홀수합 : ${total}</p>`);
		</script>
</head>
<body>
	
</body>
</html>
