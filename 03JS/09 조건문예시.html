<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>09 조건문예시</title>
	
	<script>
		//confirm() : 논리값을 입력받을 수 있는 경고창!!
		var ans = confirm("버스요금안내");
		var age;
		var state;
		var price;

		if(ans){
			age = prompt("나이를 입력하세요.");
		}else{
			age = prompt("취소지만, 나이입력:");
		}

		document.write(`<p>입력한 나이 : ${age}세</p>`);

		if(age<13){
			state = "어린이";
			price = 750;
		}else if(age<20){
			state = "청소년";
			price = 1200;
		}else{
			state = "성인";
			price = 1500;
		}

		document.write(`<p>${state} 요금 : ${price}원</p>`);
	</script>

</head>
<body>
	
</body>
</html>
