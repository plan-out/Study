<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>17 for문 예제</title>
	<script>
		var num = prompt("정수를 입력하세요");
		num = parseInt(num); //문자를 숫자로 변환

		for(let i=1; i<=num; i++){
			for(let j=1; j<=num; j++){
				if(j+i-1<num) document.write("♡");
				else document.write("♥");
			}
			document.write("<br/>");
		}
		/*
			♡♡♡♡♥<br/>
			♡♡♡♥♥<br/>
			♡♡♥♥♥<br/>
			♡♥♥♥♥<br/>
			♥♥♥♥♥<br/>
		*/
	</script>
</head>
<body>
	
</body>
</html>
