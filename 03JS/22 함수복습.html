<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>22 함수복습</title>
	<script>
		//함수선언(선언식)
		function machine(btn,water="온수"){
			let powder;
			switch(btn){
				case 1: 
					powder = "커피"; 
					break;
				case 2:
					powder = "코코아"; 
					break;
				default:	
					console.log("고장!!!");
					return "없음"; //함수가 종료됨.
			}
			console.log("1.종이컵이 나온다.");
			console.log(`2.${powder}가루가 나온다.`);
			console.log(`3.${water}가 나온다.`);
			console.log("4.완료불빛이 켜진다.");
			if(water=="온수") return "따뜻한 "+powder;
			else return "차가운 "+powder;
		}

		//함수호출
		console.log("============");
		let cup1 = machine(1);
		console.log("============");
		let cup2 = machine(2,"냉수");

		console.log("============");
		console.log("첫번째 컵안에는 "+cup1);
		console.log("두번째 컵안에는 "+cup2);
	</script>
</head>
<body>
	
</body>
</html>
