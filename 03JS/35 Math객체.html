<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>35 Math객체(p393)</title>
	<script>
		//내장객체 : 시스템에 미리 정의되어 있는 객체
		//사용자정의객체 : 사용자가 정의한 객체

		let now = new Date(); //객체생성
		console.log(now);
		let today = (now.getMonth()+1)+"월 "+now.getDate()+"일";
		console.log(today);

		//var m =  new Math(); 생성자 함수가 없어, 객체로 만들지 못함.
		console.log(Math.PI); //원주율 값 출력

		let area = Math.PI * 5 * 5; //반지름이 5인 원의 넓이

		console.log(area);
		console.log(Math.round(area)); //반올림

		let num = Math.random(); // 0 <= num < 1
		console.log(num); 

		// 1~60까지의 랜덤한 수
		num *= 60; // 0 <= num < 60
		num += 1;	 // 1 <= num < 61

		console.log(Math.floor(num));	//소수점이하의 수를 버림
		// 1~60까지의 랜덤한 정수출력

	</script>
</head>

</body>
</html>
