<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>float예제1</title>
	<style>
		#wrap{border:10px solid #f00;
			width:300px; height:300px;}
		
		#wrap  div{width:100px; height:100px;
			float:left;}
		
		#a{background:#2c6b3c;}
		#b{background:#97b8b9;}
		#c{background:#3a5b5e;}
		#d{background:#adafda; clear:both;}
		#e{background:#efd9e0;}
		#f{background:#f6eaef;}
		#g{background:#cce1f8; clear:both;}
		#h{background:#8e9d68;}
		#i{background:#71716e;}
	</style>
</head>
<body>
	<div id="wrap">
		<div id="a">a</div>
		<div id="b">b</div>
		<div id="c">c</div>
		<div id="d">d</div>
		<div id="e">e</div>
		<div id="f">f</div>
		<div id="g">g</div>
		<div id="h">h</div>
		<div id="i">i</div>
	</div>
</body>
</html>
