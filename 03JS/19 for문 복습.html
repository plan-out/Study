<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>19 for문 복습</title>
	<script>
		/*반복문(for문)*/
		for(let i=1; i<=10; i++){ //변수선언; 반복조건; 변화식
			document.write(`<p>반복되어 실행되는 문장_${i}번</p>`);
		}

		/*반복문의 중첩*/
		for(let a=1; a<=2; a++){
			document.write(`<div class="box${a}">`);
			for(let b=1; b<=3; b++){
				document.write(`<h2>두번째 반복문:${b}번</h2>`);
				for(let c=3; c>0; c--){
					document.write(`<p>세번째반복문:${c}번</p>`);
				}
				document.write("<hr/>");
			}
			document.write("</div>");
		}
	</script>
	<style>
		div{border-width:10px; border-style:solid; padding:10px;}
		.box1{border-color:red;}
		.box2{border-color:blue;}
	</style>
</head>
<body>
	
</body>
</html>
