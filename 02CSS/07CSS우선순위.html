<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>07CSS우선순위</title>
	<style>
		a{color:#fff; padding:10px 30px;}
		
		#this{background:lime;}
		
		.parent  .child{background:violet;}
		
		.grand  h1  a{background:navy;}
		h1 .child {background:brown;}
		a.child {background:olive;}
		
		.child{background:pink;}
		
		div  h1  > a{background:orange;}/*기호는 선택자의 수에 포함되지 않음.*/
		div  h1  a{background:magenta;}
		h1  a{background:cyan;}
		
		a{background:red !important;}
		a{background:blue !important;}
		/*!important 여러개인 경우, 우선순위가 적용됨.*/
	</style>
	<link href="우선순위.css" rel="stylesheet">
	<style>
		a{background:yellow;}
	</style>
</head>
<body>
	<div class="grand">
		<h1 class="parent"><a id="this" class="child" style="background:gold">CSS 우선순위</a></h1>
	</div>
	<!--
	CSS우선순위 : 스타일의 적용순서
	- 우선순위가 높다 = 최종적으로 적용되는 스타일의
	(1) 작성방식 상관없이, 작성순서가 나중에 작성된 스타일이 우선순위가 높다.
	(2) 대상을 구성하는 선택자의 수가 더 많은 쪽이 우선순위가 높다.
	(3) 태그선택자보다 클래스선택자가, 클래스선택자보다 아이디선택자가
		우선순위가 더 높다.
	(4) 인라인스타일이 우선순위가 가장 높다.
	※[!important]속성값 : 속성에 해당 속성값을 추가하면,
		우선순위를 무시하고, 해당 속성의 스타일을 강제할 수 있다.
	-->
</body>
</html>
