<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>21 화살표함수</title>
	<script>
		//함수선언(함수표현식)
		let sum = function(x,y){
			return x+y;
		}

		//함수호출 
		console.log(sum(10,5));

		//화살표함수
		let sub = (x,y) => {
			return x-y;
		}

		//함수호출
		console.log(sub(10,3));

		//화살표함수
		let mul = (x,y) => x*y;

		//함수호출
		console.log(mul(10,2));
	</script>
</head>
<body>
	
</body>
</html>
