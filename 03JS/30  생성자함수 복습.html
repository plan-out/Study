<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>30 생성자함수 복습</title>
	<script>
		//생성자함수
		function Student(name="무명",k=0,e=0,m=0){
			this.name = name;
			this.kor = k;
			this.eng = e;
			this.math = m;
			this.size = {height:null, weight:null}; //객체안의 객체
			this.info = function(){
				console.log(`${this.name}의 점수: 국어${this.kor}점, 영어${this.eng}점, 수학${this.math}점`);
			}
			this.sizeInfo = function(){
				console.log(`${this.name}의 키:${this.size.height}`);
				console.log(`${this.name}의 몸무게:${this.size.weight}`);
			}
		}

		//객체생성
		let s1 = new Student("김봄");
		//s1.name = "김봄";
		s1.kor = 90; 
		s1.eng = 80; 
		s1.math = 50; 

		let s2 = new Student("이여름",70,65,85);

		s2.size.height = 170;
		s2.size.weight = 70;

		s1.info();
		s1.sizeInfo();
		s2.info();
		s2.sizeInfo();


		

	</script>
</head>
<body>
	
</body>
</html>
