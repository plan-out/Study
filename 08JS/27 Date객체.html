<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>27 Date객체(p395)</title>
	<script>
		/*
			MDN사이트 참조 https://developer.mozilla.org/
			개발문서 https://devdocs.io/javascript/
		*/

		//date객체는 날짜와 시간의 정보를 담고, 제어하는 객체
		var now = new Date(); //현재 날짜와 시간의 정보를 가진 객체생성됨.
		console.log(now);

		var output = "<h1>날짜 : ";

		output += now.getFullYear()+"년 "; //년도 값을 추출
		output += now.getMonth()+1+"월 "; //월 값을 추출
		output += now.getDate()+"일"; //일 값을 추출
		
		switch(now.getDay()){
			case 0: output += "(일요일)"; break;
			case 1: output += "(월요일)"; break;
			case 2: output += "(화요일)"; break;
			case 3: output += "(수요일)"; break;
			case 4: output += "(목요일)"; break;
			case 5: output += "(금요일)"; break;
			case 6: output += "(토요일)"; break;
		}
	
		output += "</h1><p>시간 : ";

		var h = now.getHours();
		var m = now.getMinutes();
		var s = now.getSeconds();
		
		output += `${h}시 ${m}분 ${s}초</p>`;

		document.write(output);
	</script>
</head>
<body>
	
</body>
</html>
