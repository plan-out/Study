<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>32 객체 복습2</title>
	<script>
		/*
			객체:여러개의 변수(속성)와 여러개의 함수(메소드)를 저장할 수 있는 것
		*/

		var v = 10; //변수선언
		var f; //변수선언
		f = function(){};	//함수선언, 변수f → 함수f
		var o; //변수선언
		o = {};//객체선언, 변수o → 함수o

		//객체선언
		var obj = {
								a:10, 
								b:5,
								text:function(){
									return "객체안의 함수!!";
								}
		};

		var num = obj.a + obj.b;
		console.log("num:"+num);
		var num = obj.text();
		console.log("num:"+num);

		//객체안의 변수/함수 추가
		obj.c = 2;

		console.log(obj);
		
		//객체안의 변수/함수 제거
		delete obj.b;
		
		console.log(obj);

		//생성자함수 : 객체를 생성하는 함수
		function Student(name="무명",age=0){
			this.name = name;	//this=프로토타입
			this.age = age;
			this.info = function(){
				console.log(`이름:${this.name}, 나이:${this.age}`);
			}
		}

		//프로토타입 : 객체의 원형 = 유전자정보에 비유
		//프로토타입안에 변수와 함수를 추가가능
		Student.prototype.weight = 0;


		let s1 = new Student("김보미",10);//객체생성
		let s2 = new Student("이여름",5);
		let s3 = new Student("강가을",4);
		s1.info();
		s2.info();
		s3.info();

		console.log(s1);
		console.log(s1.prototype);

		


		
	</script>
</head>
<body>
	
</body>
</html>
