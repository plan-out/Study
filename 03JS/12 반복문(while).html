<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>12 반복문while (p345)</title>
	<script>
		/*반복문(while) : 실행문들을 반복하여 실행함. */

		console.log("실행문1");
		if(false) console.log("실행문2");//조건문
		while(false) console.log("실행문3");//반복문
		//반복문을 만들 때에는 [무한반복]이 되지 않도록 구현해야한다.

		let i = 0;//변수생성

		while(i<10){//반복조건은 반복을 시작할때마다 매번 검증한다.
			console.log("반복문실행--"+i);
			i++;//반복을 할때마다, 변수i는 1씩 증가함.
		}

		console.log("i:"+i);

		/*1부터 100까지의 합을 구하는 식*/
		var num = 1;
		var total = 0;

		while(num<=100){//num:1→2→3→4→5→6→.....→99→100
			total += num; //변수total의 현재값에 변수num을 더함.
			// 0+1+2+3+4+5+ .... +98+99+100
			num++;
		}

		console.log("1부터 100까지의 합:"+total);

	</script>
</head>
<body>
	
</body>
</html>
