<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>09표만들기</title>

<body>
	<p><iframe src="페이지.html" width="600" height="40" frameborder="0"></iframe></p>
	<h1>표만들기 기본</h1>
	<p>table태그 : 하나의 표를 생성하는 태그</p>
	<p>tr태그 : 하나의 행을 표현하는 태그</p>
	<p>td태그 : 하나의 칸을 표현하는 태그</p>
	<hr/>
	<table border="1" width="400" height="300">
		<tr>
			<td>사과</td>
			<td>수박</td>
			<td>참외</td>
			<td rowspan="2">포도</td>
		</tr>
		<tr>
			<td colspan="2">딸기</td>
			<td></td>
		</tr>
		<tr>
			<td colspan="3">레몬</td>
			<td></td>
		</tr>
	<table>
	<hr/>
	<h2>Table-1</h2><!--4행3열6칸-->
	<table border="1" width="400" height="300">
		<tr>
			<td rowspan="3"></td>
			<td></td>
			<td rowspan="3"></td>
		</tr>
		<tr>
			<td></td>
		</tr>
		<tr>
			<td></td>
		</tr>
		<tr>
			<td colspan="3"></td>
		</tr>
	</table>
	
	<hr/>
	<h2>Table-2</h2><!--3행4열9칸-->
	<table border="1" width="400" height="300">
		<tr>
			<td></td>
			<td></td>
			<td rowspan="2"></td>
			<td></td>
		</tr>
		<tr>
			<td></td>
			<td></td>
			<td></td>
		</tr>
		<tr>
			<td colspan="3"></td>
			<td></td>
		</tr>
	</table>
	
</body>
</html>
