<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>국립중앙박물관</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<!--상단영역-->
	<header>
		<div id="sns_menu">
			<ul>
				<li><img src="images/sns1.png" alt="블로그" title="블로그"/></li>
				<li><img src="images/sns2.png" alt="트위터" title="트위터"/></li>
				<li><img src="images/sns3.png" alt="페이스북" title="페이스북"/></li>
				<li><img src="images/sns4.png" alt="인스타그램" title="인스타그램"/></li>
				<li><img src="images/sns5.png" alt="유튜브" title="유튜브"/></li>
				<li><img src="images/sns6.png" alt="오디오클립" title="오디오클립"/></li>
			</ul>
		</div><!--//#sns_menu-->
		<nav id="util_menu">
			<ul>
				<li><img src="images/util01.png" alt="어린이박물관"/></li>
				<li><img src="images/util02.png" alt="학예사자격증"/></li>
				<li><img src="images/util03.png" alt="박물관신문"/></li>
				<li><img src="images/util04.png" alt="소속박물관 바로가기"/></li>
				<li><img src="images/util05.png" alt="Language"/></li>
			</ul>
		</nav><!--//#util_menu-->
		<div id="logo">
			<h1><img src="images/logo.png" alt="국립중앙박물관"></h1>
		</div><!--//#logo-->
		<nav id="gnb">
			<!--롤오버 이미지 넣기-->
			<ul>
				<li><img src="images/main_menu01.png" alt="관람정보"
								onmouseover="this.src='images/main_menu01_o.png'"
								onmouseout="this.src='images/main_menu01.png'"/></li>
				<li><img src="images/main_menu02.png" alt="전시" onmouseover="this.src='images/main_menu02_o.png'" onmouseout="this.src='images/main_menu02.png'"/></li>
				<li><img src="images/main_menu03.png" alt="교육" onmouseover="this.src='images/main_menu03_o.png'" onmouseout="this.src='images/main_menu03.png'"/></li>
				<li><img src="images/main_menu04.png" alt="소장품" onmouseover="this.src='images/main_menu04_o.png'" onmouseout="this.src='images/main_menu04.png'"/></li>
				<li><img src="images/main_menu05.png" alt="학술/출판" onmouseover="this.src='images/main_menu05_o.png'" onmouseout="this.src='images/main_menu05.png'"/></li>
				<li><img src="images/main_menu06.png" alt="소식.참여" onmouseover="this.src='images/main_menu06_o.png'" onmouseout="this.src='images/main_menu06.png'"/></li>
				<li><img src="images/main_menu07.png" alt="박물관소개" onmouseover="this.src='images/main_menu07_o.png'" onmouseout="this.src='images/main_menu07.png'"/></li>
			</ul>
		</nav><!--//#gnb : Global Navigation Bar-->
		<nav id="member_menu">
			<ul>
				<li><img src="images/login.png" alt="로그인"></li>
				<li><img src="images/join.png" alt="회원가입"></li>
				<li><img src="images/search.png" alt="검색"></li>
			</ul>
		</nav><!--//#member_menu-->
	</header>

	<!--중앙영역-->
	<main>	
		<section id="main_visual">
			<p><img src="images/main.jpg" alt="메인이미지"></p>
		</section><!--//#main_visual-->
		<section id="info">
			<dl>
				<dt><img src="images/icon1.png" alt="">관람시간</dt>
				<dd><strong>월/화/목/금/일</strong> 10:00 ~ 18:00 </dd>
				<dd><strong>수/토</strong> 10:00 ~ 21:00</dd>
				<dd> * 입장 마감은 폐관30분 전까지</dd>
			</dl>
			<dl>
				<dt><img src="images/icon2.png" alt="">관람료</dt>
				<dd><strong>무료</strong></dd>
				<dd>특별전시는 유료</dd>
			</dl>
		</section><!--//info-->
		<section id="info_link">
			<ul>
				<li><img src="images/info_link01.png" alt="오시는길"
								onmouseover="this.src='images/info_link01_o.png'"
								onmouseout="this.src='images/info_link01.png'"></li>
				<li><img src="images/info_link02.png" alt="예약하기"
								onmouseover="this.src='images/info_link02_o.png'"
								onmouseout="this.src='images/info_link02.png'"></li>							
			</ul>
		</section><!--//info_link-->
		<section id="gallery">
			<h2>전시</h2>
			<ul>
				<li>
					<p><img src="images/content01.jpg" alt=""></p>
					<p><span>현재전시</span> <span>대구</span></p>
					<h3>영남 명찰순례Ⅱ 팔공산 은해사</h3>
					<p class="date">2022-11-08 ~ 2023-02-19</p>
				</li>
				<li><img src="images/content02.jpg" alt=""></li>
				<li><img src="images/content03.jpg" alt=""></li>
				<li><img src="images/content04.jpg" alt=""></li>
			</ul>
		</section><!--//#gallery-->
	</main>

	<!--하단영역-->
	<footer>

	</footer>
</body>
</html>
