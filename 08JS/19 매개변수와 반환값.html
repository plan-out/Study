<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>19 매개변수와 반환값(p357-360)</title>
	<script>
		let a = 10;
		let b = 5;

		//함수선언
		function sum(x, y){//매개변수 : 함수 괄호안에서 선언된 변수
			var value = x + y;
			console.log("두 수의 합:"+value);
		}

		//함수호출시 각 매개변수에 들어갈 값을 지정해주어야 한다.
		//매개변수에 들어가는 값을 "인수"라고 한다.
		sum(20,13); //(순차적으로) x=20, y=13
		sum(8,6); //(순차적으로) x=8, y=6
		sum(a,b); //(순차적으로) x=a, y=b

		//함수선언
		function sub(x=2, y=1){ //각 매개변수에 기본값을 설정
			var value = x - y; //함수안에서 만들어진 변수는 함수안에서만 사용가능
			console.log("두 수의 차:"+value);
		}

		sub(); //인수가 없거나, 부족하면 기본값을 사용.
		sub(20); //부족하면, 앞에서부터 채움. x=20, y=1
		sub(100,44); //(순차적으로) x=100, y=44

		//함수선언
		function mul(x, y=2){
			//매개변수의 기본값은 일부만 설정 가능하다.
			//일부만 설정될 경우, 뒤에서부터 설정되어야한다.
			var value = x * y;
			console.log("두 수의 곱:"+value);
		}

		mul(10); //x에 들어갈 값은 반드시 필요
		mul(20,4); //(순차적으로) x=20, y=4

		//함수선언
		function remain(x,y){
			var value = x % y; //나머지연산자
			console.log(`${x}를 ${y}로 나눈 나머지값:${value}`);
			return value; //반환값, 함수의 종료
			//반환값 : 함수를 실행하면, 호출된 위치에 반환되는 값
			//함수의 종료 : return 다음에 오는 식은 실행되지 않는다.
			console.log("안녕하세요!");
		}

		var num = remain(10,3);
		console.log("num:"+num);

		console.log("함수결과:"+remain(423,4));
	</script>
</head>
<body>
	
</body>
</html>
