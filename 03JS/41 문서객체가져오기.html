<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>41 문서객체가져오기</title>
</head>
<body>
	<h1 id="title">문서객체가져오기</h1>
	<section>
		<div class="box" id="abc"><span>영역태그</span></div>
		<div class="box item"><span>영역태그</span></div>
		<div class="item"><span>영역태그</span></div>
	</section>
	<!--문서 하단에 script작성-->
	<script>
		/*태그를 기준으로 객체를 만들기*/
		var divs = document.getElementsByTagName("div");
		//가져온 div객체들은 "divs"배열에 저장된다.

		console.log(divs);
		divs[0].style.border = "2px solid #f00";
		divs[1].style.border = "2px solid #0f0";
		divs[2].style.border = "2px solid #00f";

		/*아이디를 기준으로 객체를 만들기*/
		var title = document.getElementById("title");
		console.log(title);

		with(title.style){
			backgroundColor = "#fcc";
			margin = "50px 20px";
			color = "#fff";
			//["line-height"] = "80px";
		}

		/*클래스를 기준으로 객체를 만들기*/
		var boxs = document.getElementsByClassName("box");
		//배열로 객체가 만들어짐.
		boxs[0].style.background = "#ccf";
		boxs[1].style.background = "#cff";

		/*querySelector : CSS에서 대상을 선택하는 방식을 사용하여 지정*/
		var abc = document.querySelector("#abc");
		abc.style.fontSize = "30px";

		var div = document.querySelector("div");
		abc.style.color = "#f00";
		//맨 처음 div요소 하나만 선택됨.

		var divAll = document.querySelectorAll("div");
		divAll[0].style.color = "#f00";
		divAll[1].style.color = "#0f0";
		divAll[2].style.color = "#00f";

		var items = document.querySelectorAll(".item");
		items[0].style.textAlign = "center";
		items[1].style["text-align"] = "center";

		var span = document.querySelector("#abc span");
		span.style.cssText = "font-size:50px; letter-spacing:15px;";

		var last = document.querySelector("div:last-child");
		last.style.padding = "20px 0";
	</script>

</body>
</html>
