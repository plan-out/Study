<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>02 기본명령어</title>
</head>
<body>
	<h1>학습 하기전 알아두어야 할 명령어(p314)</h1>
	<hr/>
	<script>
		/*출력에 관한 명령어*/
		document.write("웹페이지에 출력"); //웹페이지에 ()안의 내용을 작성
		console.log("콘솔창에 출력"); //콘솔창에 ()안의 내용을 작성
		alert("경고창에 출력"); //경고창에 ()안의 내용을 출력

		/*입력에 관한 명령어*/
		prompt("값을 입력하세요"); //값을 입력받을 수 있는 경고창

		/*확인에 관한 명령어*/
		confirm("확인/취소"); 
		//확인(true) or 취소(false)의 값을 입력받는 경고창
	</script>
</body>
</html>
