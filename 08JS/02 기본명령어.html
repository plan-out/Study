<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>02 기본명령어(p314)</title>
</head>
<body>
	<h1>기본명령어</h1>
	<script>
		/*출력에 관한 명령어*/
		document.write("웹페이지에 출력!!");
		alert("경고창에 출력!!");
		console.log("콘솔창에 출력!!");

		/*입력에 관한 명령어*/
		prompt("값을 입력하세요.");//값을 입력받을 수 있는 경고창

		/*확인에 관현 명령어*/
		confirm("확인 or 취소 버튼");
		//확인(true) / 취소(false)의 값을 입력받는 경고창
	</script>
</body>
</html>
