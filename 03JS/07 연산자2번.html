<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>07연산자2번(p333~339)</title>
	<script>
		let a = 10;
		let b = 5;

		/*비교연산자(==,>,>=,<,<=,!=,===,!==) - p333
			: 좌변과 우변을 비교하여, 결과를 논리값으로 추출한다.
			[true] : 참 = 식이 성립하는 경우
			[false]	: 거짓 = 식이 성립하지 않는 경우					*/
		console.log("[비교연산자]");
		console.log("같다:"+(a==b));	//false
		console.log("같지않다:"+(a!=b)); //true
		console.log("좌변이 크다:"+(a>b));	//true
		console.log("좌변이 크거나 같다:"+(a>=b)); //true
		let c = 10;
		console.log("좌변이 작다:"+(a<c)); //false
		console.log("좌변이 작거나 같다:"+(a<=c)); //true

		let d = "5";
		console.log("변수b의 타입:"+typeof(b));
		console.log("변수d의 타입:"+typeof(d));
		console.log("b==d:"+(b==d)); //true
		console.log("b!=d:"+(b!=d)); //false

		//값과 타입모두 일치해야함.
		console.log("b===d:"+(b===d)); //false
		console.log("b!==d:"+(b!==d)); //true
		
		var num = prompt("num의 값은?");
		console.log("변수num의 타입:"+typeof(num));
		console.log("입력값은 100보다 크다.:"+(num>100));
		console.log("입력값은 100과 같다.:"+(num===100));
		console.log("입력값은 100보다 작다.:"+(num<100));

		/*논리연산자(&&,||,!) - p335
			: 두 개의 논리값을 연산하여 하나의 논리값을 추출*/

		//AND연산자(&&):좌변과 우변이 모두 true인 경우, true출력
		console.log("[AND연산자]");
		console.log(true&&true); //true
		console.log(true&&false); //false
		console.log(false&&true); //false
		console.log(false&&false); //false

		//OR연산자(||):좌변과 우변 중, 단 하나라도 true인 경우, true출력
		console.log("OR연산자");
		console.log(true||true); //true
		console.log(true||false); //true
		console.log(false||true); //true
		console.log(false||false); //false

		//주로, 비교연산자와 조합
		console.log((a>9)&&(b==5)); //true
		console.log((a>=10)&&(c>5)&&(a+b>15)); //false
		console.log((b==5)&&(a<b)||(a!=11)); //true

		//NOT - 논리부정연산자(!) : 논리값을 부정함(반전함)
		console.log(!true); //false
		console.log(!(a<b)); //true

		/*비트연산자 : 나중에 공부해볼 것*/

		/*조건연산자(?:) = 삼항연산자 - p339
			: (조건)?참값:거짓값*/
		let fruit = (false)?"딸기":"사과";
		//괄호안의 값이 참이면 "딸기", 거짓이면 "사과"라는 결과
		console.log(fruit);	//"사과"
		
		b=20;
		console.log("a는 b보다 "+((a>b)?"크다.":"작다."));


	</script>
</head>
<body>
	
</body>
</html>
