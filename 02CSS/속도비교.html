<html xmlns="http://www.w3.org/1999/xhtml"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>속도비교</title>

</head>

<body>
<style>
body{margin:0; padding:0;}
div{width:96%; border:5px solid #000; margin:20px 2% 0; position:relative;}
@keyframes vol{
	0{margin-left:0%;}
	100%{margin-left:85%;}
}
p{width:15%;  height:50px; line-height:50px; font-weight:bold; 
	color:#fff; font-size:20px; text-align:center; margin:15px 0;
	text-shadow:0px 0px 7px rgba(0,0,0,0.8);}
#a p{animation:vol 4s ease infinite  both;	}
#b p{animation:vol 4s ease 1s forwards;	}
</style>
<div id="a">
	<p style="background:#C00; animation-timing-function:ease;">ease</p>
    <p style="background:#CC0; animation-timing-function:linear;">linear</p>
    <p style="background:#C0C; animation-timing-function:ease-in;">ease-in</p>
    <p style="background:#0CC; animation-timing-function:ease-out;">ease-out</p>
    <p style="background:#00C; animation-timing-function:ease-in-out;">ease-in-out</p>
</div>    

<div id="b">
	<p style="background:#f00; animation-timing-function:step-start;">step-start</p>	
    <p style="background:#f33; animation-timing-function:steps(2,start);">steps(2,start)</p>
    <p style="background:#f77; animation-timing-function:steps(3,start);">steps(3,start)</p>
	<p style="background:#faa; animation-timing-function:steps(4,start);">steps(4,start)</p>
	<p style="background:#00f; animation-timing-function:step-end;">step-end</p>
    <p style="background:#33f; animation-timing-function:steps(2,end);">steps(2,end)</p>
    <p style="background:#77f; animation-timing-function:steps(3,end);">steps(3,end)</p>
	<p style="background:#aaf; animation-timing-function:steps(4,end);">steps(4,end)</p>
</div> 




</body></html>
