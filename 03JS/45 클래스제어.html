<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>45 클래스제어</title>
	<style>
		#box{position:fixed; width:40%; top:50px; bottom:50px;
			right:50px; box-sizing:border-box; background:#fcc;
			border:10px solid #f00; transition:all .4s;}
		#box.active{width:20%; top:100px; bottom:100px;
			background:#cff;}

		a{display:inline-block; padding:20px 10px;
			font-size:30px; background:#000; color:#fff;
			font-weight:bold; cursor:pointer;}
	</style>
</head>
<body>
	<div id="box" class="abc def">대상상자</div>
	<a id="btn1">클래스추가</a>
	<a id="btn2">클래스제거</a>
	<a id="btn3">클래스추가/제거</a>

	<script>
		var box = document.getElementById("box");
		var b1 = document.querySelector("#btn1");
		var b2 = document.querySelector("#btn2");
		var b3 = document.querySelector("#btn3");

		b1.addEventListener("click",function(){
			box.classList.add("active");
		});
		b2.addEventListener("click",function(){
			box.classList.remove("active");
		});
		b3.addEventListener("click",function(){
			box.classList.toggle("active");
		});

		var text = box.classList.item(1);
		console.log(text);
		/*
			Element.classList.add("클래스명"); 인수값을 요소에 클래스로 부여함.
			Element.classList.remove("클래스명"); 해당클래스를 제거함.
			Element.classList.toggle("클래스명"); //부여와 제거
			Element.classList.contains("클래스명");
				해당클래스가 있으면 true, 없으면 false라는 논리값을 출력
			Element.classList.replace("기존이름","새이름");
				클래스명을 "기존이름"에서 "새이름"으로 바꿈
			Element.classList.item(정수);
			  여러개의 클래스가 설정되었을 시, 특정순번의 클래스명을 반환한다.
		*/
	</script>
</body>
</html>
