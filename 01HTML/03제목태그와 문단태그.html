<!doctype html>
<html>
<head>
<title>03 제목태그와 문단태그</title>
</head>
<body>
		<p><iframe src="페이지.html" width="600" height="40" frameborder="0"></iframe></p>

사이트의 기술적 정의<br/>
:공통된 주제로 작성되어진 웹문서(웹페이지)들이
서로 연결되어 있으면 하나의 사이트가 된다.

<!--제목태그 : 웹문서내에 제목을 표시하는 태그-->
<h1>제목태그</h1><!--가장 큰 개념(사이트)의 제목을 표시-->
<h2>제목태그</h2><!--h1보다 작은 개념(페이지)의 제목-->
<h3>제목태그</h3><!--페이지안에 있는 컨텐츠 영역의 제목-->
<h4>제목태그</h4><!--위 영역보다 하위영역의 제목-->
<h5>제목태그</h5><!--위 영역보다 하위영역의 제목-->
<h6>제목태그</h6><!--위 영역보다 하위영역의 제목-->

<!--문단(단락)태그 : 내용을 표기할 때-->
<p>단락태그</p>

<!--주소태그 : 주소나 이메일 연락처 표시-->
<address>주소태그</address>
</body>
</html>
