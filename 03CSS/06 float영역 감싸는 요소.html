<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>06 float영역 감싸는 요소</title>
</head>
<body>
	<h1>06 float영역 감싸는 요소</h1>
	<hr>
	<style>
		/*
			[가상요소선택자]
			대상요소::before{ 대상요소안에서 맨앞에 영역을 생성 }
				※맨앞 = 첫번째 자식요소보다 이전을 뜻함.
			대상요소::after{ 대상요소안에서 맨뒤에 영역을 생성 }	
				※맨뒤 = 마지막 자식요소보다 이후를 뜻함.
		*/
		h1{border:1px solid #000;}
		h1::before{content:"비포"; color:#f00;}
		h1::after{content:"에프터"; color:blue;}
		hr{height:4px; background:#000; margin:20px 0;}
	</style>

	<h2>강제적으로 높이값 주기</h2>
	<ul id="box1">
		<li></li>
		<li></li>
		<li></li>
		<li></li>
	</ul>
	<hr>

	<style>
		#box1{border:10px solid #0f0; padding:0; height:300px;}
		#box1 li{width:calc(25% - 2px); height:300px; border:1px solid #000;
			background:#fcc; list-style:none; float:left;
			max-width:300px; /*최대너비제한*/
			min-width:200px; /*최소너비제한*/
		}
		hr{clear:both;}
	</style>

	<h2>float를 인식하는 마지막자식요소(block)을 추가하기</h2>
	<section id="box2" class="clearfix">
		<div></div>
		<div></div>
		<div></div>
		<div></div>
	</section>

	<style>
		body{height:3000px;}
		#box2{border:10px solid #0f0;}
		.clearfix::after{content:""; display:block; clear:both;}

		#box2 div{width:25%; height:300px; border:1px solid #000;
			background:#ffc; float:left;
			box-sizing:border-box; /*테두리 영역까지 크기조절함.*/
			max-width:300px; min-width:200px;}
	</style>

</body>
</html>
