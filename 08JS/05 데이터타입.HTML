<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>05 데이터타입(p321-325)</title>
	<script>
		//1.숫자데이터(number)
		let a = 123; //정수타입
		let b = 1.23; //실수타입
		let c = 1e+2; //지수타입 = 1×10² = 100

		//2.문자데이터(string) : "" 나 ''로 묶어서 표시
		var text = "문자열";
		console.log(text);
		console.log('text');
		console.log("그는 \"안녕하세요.\"라고 말했다.");
		//텍스트 상태로의 ""나 ''를 사용하려면, \를 앞에 입력한다.

		//3.논리데이타(boolean) : 참(true), 거짓(false)
		var dd = true;
		console.log(dd);
		console.log(false);

		//4.데이터없음(undefined:정의되지않음, null:비어있음.)
		var e;
		console.log(e); //undefined

		var f = null;
		console.log(f); //null

		//데이터의 타입을 확인하는 명령어 : typeof()
		console.log(typeof(a));
		console.log(typeof(b));
		console.log(typeof(c));
		console.log(typeof(text));
		console.log(typeof(dd));
		console.log(typeof(e));
		console.log(typeof(f));
	</script>

</head>
<body>
	
</body>
</html>
