<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>15 반복문(do while) - p346</title>
	<script>
		/*while문*/
		let a = 20;
		while(a<=10){ //반복을 실행하기 전에 반복조건을 검증
			console.log("while문 반복 a:"+a);
			a++;
		}

		/*do while문*/
		let b = 20;
		do{
			console.log("do while문 반복 b:"+b);
			b++;
		}while(b<=10); //반복을 계속 진행하는 것을 반복조건으로 검증

		/*
			break : (p350) 중지 : 블록(중괄호) 밖으로 나감.
			continue : (p351) 건너뛰기
		*/
		let num = 0;
		while(num<10){
			num++;
			if(num==4) continue; //아래내용을 건너뛰고 반복함.
			if(num==7) break; //반복이 종료됨.
			document.write(`반복문 ${num}번째 실행!!<br/>`);
		}

		document.write("<hr/>반복종료!!");
	</script>
</head>
<body>
	
</body>
</html>
