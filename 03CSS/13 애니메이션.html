<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>13 애니메이션</title>
	<style>
		@keyframes play{
			from{background:yellow;}
			to{background:red; color:green}
		}

		h2{padding:10px; background:blue; color:#fff;
			animation-name:play; /*애니메이션 지정*/
			animation-duration:2s;	/*재생시간*/
			animation-iteration-count:infinite;	/*반복횟수(infinite:무한반복)*/
		}

		@keyframes move{
			0%{transform:translate(100px,100px); background:cyan;}
			20%{transform:translate(200px,100px);}
			40%{transform:translate(200px,0px);}
			60%{transform:translate(300px,0px);}
			80%{transform:translate(300px,100px);}
			100%{transform:translate(400px,100px); background:purple;}
		}

		#this{width:50px; height:50px; 
			background:red;
			border-radius:50%;
			animation-name:move;	/*애니메이션 지정*/
			animation-duration:5s; /*재생시간*/
			animation-timing-function:ease;	/*구간별속도*/
			/* arof.kr/속도비교.html */
			animation-delay:3s; /*대기시간*/
			animation-iteration-count:5;	/*반복횟수*/
			animation-direction:alternate;		/*재생방향*/
			/* normal(정방향), reverse(역방향),
				 alternate(정-역), alternate-reverse(역-정)*/
			animation-fill-mode:both; /*대기중, 완료후 스타일 적용*/
			/* forwards(완료후 스타일 고정), backwards(대기중 스타일 고정),
				 both(둘다 스타일 고정)*/
			
			/*축약표현
			animation:이름 재생시간 [속도] [대기시간] [반복횟수] [방향] [스타일];*/
			animation:move 5s linear 0s infinite alternate both;
		}

		#this:hover{
			animation-play-state:paused;	/*재생상태*/
			/* running(재생중), paused(일시정지)*/
		}
	</style>
</head>
<body>
	<h2>css : animation</h2>
	<p>시간에 흐름에 따라 여러 스타일로 변화하는
		애니메이션을 생성한다.</p>
	<div id="this"></div>
</body>
</html>
