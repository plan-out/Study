<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>익산시민기록관</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="links">
    <ul>
      <li><a href="#"><img src="./images/ext_01.png" alt="랜딩페이지"></a></li>
      <li><a href="#"><img src="./images/ext_02.png" alt="익산시청"></a></li>
      <li><a href="#"><img src="./images/ext_03.png" alt="문화도시익산"></a></li>
    </ul>
  </div><!--e:.links-->
  <header>
    <div class="inner">
      <div class="logo">
        <h1><a href="#"><img src="./images/logo.png" alt="익산시민기록관"></a></h1>
      </div><!--e:.logo-->
      <nav id="gnb">
        <ul><!--롤오버이미지:마우스올렸을때 다른이미지로 전환-->
          <li><a href="#"><img alt="익산시민기록관" 
            src="./images/main_menu01.png"
            onmouseover="this.src='./images/main_menu01_o.png'"
            onmouseout="this.src='./images/main_menu01.png'"></a></li>
          <li><a href="#"><img alt="컬렉션" src="./images/main_menu02.png" onmouseover="this.src='./images/main_menu02_o.png'" onmouseout="this.src='./images/main_menu02.png'"></a></li>
          <li><a href="#"><img alt="전시" src="./images/main_menu03.png" onmouseover="this.src='./images/main_menu03_o.png'" onmouseout="this.src='./images/main_menu03.png'"></a></li>
          <li><a href="#"><img alt="기록이야기" src="./images/main_menu04.png" onmouseover="this.src='./images/main_menu04_o.png'" onmouseout="this.src='./images/main_menu04.png'"></a></li>
          <li><a href="#"><img alt="시민기록활동" src="./images/main_menu05.png" onmouseover="this.src='./images/main_menu05_o.png'" onmouseout="this.src='./images/main_menu05.png'"></a></li>
          <li><a href="#"><img alt="기록찾기" src="./images/main_menu06.png" onmouseover="this.src='./images/main_menu06_o.png'" onmouseout="this.src='./images/main_menu06.png'"></a></li>
          <li><a href="#"><img alt="소식·안내" src="./images/main_menu07.png" onmouseover="this.src='./images/main_menu07_o.png'" onmouseout="this.src='./images/main_menu07.png'"></a></li>
        </ul>
      </nav><!--e:#gnb-->
      <nav id="util_menu">
        <ul>
          <li><a href="#"><img src="./images/search.png" alt="검색"></a></li>
          <li><a href="#"><img src="./images/login.png" alt="로그인"
            onmouseover="this.src='./images/login_o.png'"
            onmouseout="this.src='./images/login.png'"></a></li>
        </ul>
      </nav><!--e:#util_menu-->
    </div><!--e:.inner-->  
  </header>

  <main>
    <section id="main_view">
      <p><img src="./images/메인배너2_공모전2회.png" alt="메인이미지"></p>
    </section><!--e:#main_view-->

    <section id="search">
      <form action="검색시스템의 주소">
        <p><input type="text" placeholder="기록물검색을 위해 검색어를 입력해주세요.">
          <button>검색</button></p>
      </form>
    </section><!--e:#search-->

    <section id="statics">
      <dl>
        <dt><img alt="전체소장기록" src="images/item_t.png"></dt>
        <dd><img alt="문서" src="images/item_01.png"
              onmouseover="this.src='images/item_01_o.png'"
              onmouseout="this.src='images/item_01.png'"></dd>
        <dd><img alt="도서" src="images/item_02.png" onmouseover="this.src='images/item_02_o.png'" onmouseout="this.src='images/item_02.png'"></dd>
        <dd><img alt="사진" src="images/item_03.png" onmouseover="this.src='images/item_03_o.png'" onmouseout="this.src='images/item_03.png'"></dd>
        <dd><img alt="그림" src="images/item_04.png" onmouseover="this.src='images/item_04_o.png'" onmouseout="this.src='images/item_04.png'"></dd>
        <dd><img alt="음성" src="images/item_05.png" onmouseover="this.src='images/item_05_o.png'" onmouseout="this.src='images/item_05.png'"></dd>
        <dd><img alt="영상" src="images/item_06.png" onmouseover="this.src='images/item_06_o.png'" onmouseout="this.src='images/item_06.png'"></dd>
        <dd><img alt="박물" src="images/item_07.png" onmouseover="this.src='images/item_07_o.png'" onmouseout="this.src='images/item_07.png'"></dd>
      </dl>
    </section><!--e:#statics-->

    <section id="online">
      <h2>온라인 전시</h2>
      <p class="more"><img src="./images/more-plus2.png" alt="더보기"></p>
      <ul>
        <li>
          <p><img src="./images/online01.jpg" alt=""></p>
          <h3>익산의 추억, 기록으로 기억되다</h3>
        </li>
        <li>
          <p><img src="./images/online02.jpg" alt=""></p>
          <h3>익산교육의 발자취, 기록으로 말하다</h3>
        </li>
        <li>
          <p><img src="./images/online03.png" alt=""></p>
          <h3>익산의 문화예술! 시민의 기록과 추억으로 만나다!</h3>
        </li>
        <li>
          <p><img src="./images/online04.png" alt=""></p>
          <h3>익산 근대의 시작, 이리역</h3>
        </li>
      </ul>
    </section><!--e:#online-->
  </main>
</body>
</html>
