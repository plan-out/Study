<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>44 이벤트</title>
</head>
<body>
	<div id="box">

	</div>
	<a onclick="changeColor('red')">red</a>
	<a onclick="changeColor('blue')">blue</a>
	<a onclick="changeColor('green')">green</a>
	<a class="btn">버튼1</a>
	<a class="btn">버튼2</a>
	<!--스크립트 작성-->
	<script>
		var div_box = document.getElementById("box"); //DOM객체 생성
		div_box.style.cssText = "background:#ccc; border:10px solid #000;"
		div_box.style.width = "300px";
		div_box.style.height = "100px";

		function changeColor(color="yellow"){
			div_box.style.background = color;
		}
		
		
		//기본 이벤트 모델(p406)
		var bt = document.getElementsByClassName("btn"); //DOM객체 생성:배열
		
		bt[0].onclick = function(){ //실행되지 않음.
			changeColor();
		};
		bt[0].onclick = function(){
			document.body.style.background = "#fcc";
		};
		//기본이벤트모델은 이벤트당, 하나의 익명함수가 저장되기에
		//중복작성되는 경우, 마지막에 설정된 이벤트만 동작된다.

		/*표준 이벤트 모델(p408)*/
		bt[1].addEventListener("click",function(){
			changeColor("cyan");
		});
		bt[1].addEventListener("click",function(){
			document.body.style.background = "#ccf";
		});
		//동일한 두 이벤트가 모두 실행
		bt[1].addEventListener("mouseover",function(){
			this.style.background="blue";
			this.style.color="white";
		});
		bt[1].addEventListener("mouseout",function(){
			this.style.background=null;
			this.style.color="black";
		});



		
		
	</script>
</body>
</html>
