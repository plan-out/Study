<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>26 객체(p372)</title>
	<script>
		/*
			객체:여러개의 변수(속성)와 여러개의 함수(메소드)를 가질 수 있는 것
		*/

		var num =3; //변수:하나의 특정한 값을 저장한 수
		var f = function(){}; //함수:여러개의 실행문을 저장한 것
		var o = {};	//객체선언

		//객체선언
		var object = {
									a:10, //객체안에 변수(속성)을 생성한 것
									b:7, 
									text:"안녕하세요",
									sum:function(x,y){ //객체안에 함수(메소드)을 생성한 것
										return x+y;
									},
									printText:function(){
										console.log("객체안의 함수!!");
									},
									obj:{
										num1:22,
										text:"객체안의 객체!!",
									},
								};

		//객체에 있는 변수(속성) 호출
		num	= object.a + object.b;	
		console.log(num);
		console.log(object.text);
		object.text = "좋은아침!!";
		console.log(object.text);

		//객체안에 있는 함수(메소드) 호출
		num = object.sum(100,24);

		console.log("num:"+num);
		document.write("웹페이지의 출력!!");
		object.printText();

		//객체안의 객체의 변수 호출
		num = 100 + object.obj.num1;
		console.log("num:"+num);
		console.log(object.obj.text);
	</script>
</head>
<body>
	
</body>
</html>
