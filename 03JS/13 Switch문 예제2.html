<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>13 Switch문 예제2</title>
	<script>
		/*
			"월"을 입력받아서, 계절과 말일을 출력하는 프로그램.
		*/
	
		let mon = prompt("현재 월을 입력하세요"); //"6"

		if((mon>=1)&&(mon<=12)){	// mon : 1 ~ 12
			document.write("<h1>입력한 월 : "+mon+"월</h1>");		
		}else{
			document.write("<h1>잘못된 값을 입력하였습니다.</h1>");
		}

		/*계절*/
		switch(mon){
			case "3": case "4": case "5":
				document.write(`<p>${mon}월은 봄입니다.</p>`);
				break;
			case "6": case "7": case "8":
				document.write(`<p>${mon}월은 여름입니다.</p>`);
				break;
			case "9": case "10": case "11":
				document.write(`<p>${mon}월은 가을입니다.</p>`);
				break;
			case "12": case "1": case "2":
				document.write(`<p>${mon}월은 겨울입니다.</p>`);
				break;
		}

		/*말일*/
		//mon = "5"
		mon = parseInt(mon); //문자("5")를 정수(5)로 변환함.

		switch(mon){
			case 1: case 3: case 5: case 7: case 8: case 10: case 12:
				document.write(`<p>${mon}월은 31일까지 있습니다.</p>`);
				break;
			case 4: case 6: case 9: case 11:
				document.write(`<p>${mon}월은 30일까지 있습니다.</p>`);
				break;
			case 2: 
				document.write(`<p>${mon}월은 28일 또는 29일까지 있습니다.</p>`);
				break;
		}

	</script>
</head>
<body>
	
</body>
</html>
