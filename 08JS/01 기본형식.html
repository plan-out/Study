<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>01 기본형식(p310~314)</title>
	<!--외부 CSS문서 연결-->
	<link rel="stylesheet" href="style.css">

	<!--html문서 내부에서 스타일 작성-->
	<style>
		/*CSS작성*/
		body{background:#ffc;}
	</style>

	<!--외부 JS문서 연결-->
	<script src="script.js"></script>

	<!--html문서 내부에서 JS 작성-->
	<script>
		/*JS작성*/
		document.write("자바스크립트 시작!!"); //한 줄 주석
	</script>

</head>
<body>
	<!--태그에 속성으로 스타일작성:인라인스타일-->
	<h1 style="color:red;">JS 기본형식(p310~314)</h1>

	<!--태그에 스크립트를 작성하는 방법-->
	<!--(1) 링크태그의 url부분을 스크립트롤 작성할 수 있다.-->
	<a href="javascript:alert('경고창')">버튼</a>
	<!--(2) 이벤트관련 속성을 사용하여 스크립트를 작성할 수 있다.-->
	<img src="../03CSS/강아지.jpg" alt="롤오버이미지" width="200"
			 onmouseover="this.src='../03CSS/고양이.png'"
			 onmouseout="this.src='../03CSS/강아지.jpg'">

	<script>
		document.write("<p>맨마지막에 작성!!</p>");
		/*
			문서의 하단에 작성하는 이유
			:html요소가 선행되어 처리되어야지, 작성된 html요소를 사용하여
			스크립트를 만들 수 있다.
		*/
	</script>
</body>
</html>
