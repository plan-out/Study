<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>09블록태그의 수평정렬</title>
	<style>
		div{border:5px solid #f00;}
		
		p{width:100px; height:100px;
			border:5px solid #000;
			background:#ccc;
			font-size:30px; font-weight:bold;
			text-transform:uppercase;
			margin:0;}
			
		#wrap1{text-align:center;}	
		#wrap1  p{display:inline;}	
			
		#wrap2{text-align:right;}
		#wrap2  p{display:inline-block;}
		.f, .j{height:150px; font-size:50px;}
		
		#wrap3{height:160px;}
		#wrap3  p{float:left;}
	</style>
</head>
<body>
	<h1>블록요소의 수평정렬</h1>
	<hr/>
	<div id="wrap1">
		<p>a</p><p>b</p><p>c</p><p>d</p>
		<!--
		1. display:inline;
			[유의사항]
			(1) 크기조절이 안됨.  (2) 공백(띄어쓰기)이 인식함.
			(3) 다른 block요소(태그)를 넣을 수 없다.
		-->
	</div>
	<hr/>
	<div id="wrap2">
		<p>e</p><p class="f">f</p><br/><p>g</p><p>h</p>
		<!--
		2.display:inline-block;
			[유의사항] 공백을 인식함.
		-->
	</div>
	<hr/>
	<div id="wrap3">
		<p>i</p>
		<p class="j">j</p>
		<p>k</p>
		<p>l</p>
		<!--<h3 style="width:150px; height:150px; background:#fcc; margin:0;
							 clear:both;">new</h3>-->
		<!--
		3.float:left; (right)
			[유의사항과 특징]
			(1) 가운데 정렬이 안됨.
			(2) block요소가 float 적용된 요소를 인식하지 못함.
				[float요소 인식하는 방법]
				A. float요소 다음에 오는 block요소	
					: clear속성을 사용하여 float효과를 지운다.( 줄바꿈한다.)
					- clear:both; (left, right)
				B. float요소를 감싸는 부모(조상)요소
					a) 부모요소에게 float를 설정함. (추천하지 않음.)
					b) 필요한 만큼의 높이를 강제적으로 설정한다. (주로사용 / 유동적이지 않다.)
					c)
					d)
		-->
	</div>
	
</body>
</html>
