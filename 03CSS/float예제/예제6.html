<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>예제6</title>
	<style>
		*{margin:0; padding:0;}

		#box1{border:10px solid #000; margin:50px 50px 20px;
			width:600px; height:280px;}

		#a-1{background:#ffc; width:65%; height:280px; float:left;}

		#a-2, #a-3, #a-4{background:#fcc; width:30%; height:80px;
			float:right;}
		#a-3{margin:20px 0;}
		
		#box2{border:10px solid #000; width:600px; margin-left:50px;
			height:100px;}
		#box2 div{width:30%; height:100px; background:#ccf;
			float:left;}
		#b-2{margin:0 5%;}
		
		#box3{border:10px solid #000; width:600px; margin:20px 0 0 50px;
			height:200px;}
		#box3 div{width:47.5%; background:#cfc; height:200px;
			float:left;}
		#c-1{margin-right:5%;}
	</style>
</head>
<body>
	<div id="box1">
		<div id="a-1">a-1</div>
		<div id="a-2">a-2</div>
		<div id="a-3">a-3</div>
		<div id="a-4">a-4</div>
	</div>

	<div id="box2">
		<div id="b-1">b-1</div>
		<div id="b-2">b-2</div>
		<div id="b-3">b-3</div>
	</div>

	<div id="box3">
		<div id="c-1">c-1</div>
		<div id="c-2">c-2</div>
	</div>

</body>
</html>
