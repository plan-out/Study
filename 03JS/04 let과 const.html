<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>04 let과 const(p318-320)</title>
	<script>
		/*
			변수를 선언하는 또 다른 예약어 : let
		*/

		var aa = 10; //변수aa를 선언함.
		let bb = 20; //변수bb를 선언함.
		// aa와 bb는 동일한 기능하는 변수이다.

		console.log(aa); //10
		 
		aa = 20; //값을 변경함.
		console.log(aa); //20

		var aa = 30; //변수aa를 "또" 선언함.(할 필요가 없다.)
		console.log(aa); //30

		console.log(bb);//20 
		bb = 22; //값을 변경함.
		console.log(bb);//22

		/*
		let bb = 33; //선언된 변수를 재정의할 수 없다.
		console.log(bb);
		*/

		cc = 100; //예약어 없이 변수생성이 가능하다.
							//(다음과 같은 방법은 되도록 사용하지않는다.)

		console.log(cc);//100					

		/*
			상수(constant) : 저장된 값이 변화하지 않는 수
			※상수의 식별자는 주로 대문자로만 작성한다.
		*/

		const NUM = 5;

		console.log(NUM);

		//NUM = 10; //값을 변경할 수 없다.

		console.log(NUM);
	</script>


</head>
<body>
	
</body>
</html>
