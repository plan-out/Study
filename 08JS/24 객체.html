
<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>24 객체(p372)</title>
	<script>
		/*
			객체:여러개의 변수(속성)와 여러개의 함수(메서드)를 가질 수 있는 것
		*/

		var n = 3; //변수:하나의 특정한 값을 저장한 수
		var f = function(){};	//함수:여러개의 실행문을 저장한 것
		var o = {}; //객체선언
		
		//객체
		var object = {
									a:10, //객체안에 변수(속성)을 생성
									b:7,
									text:"안녕하세요",
									sum:function(x,y){ //객체안에 함수(메서드)를 생성
										return x+y;
									},
									outputText:function(){
										console.log("객체안의 함수!!");
									},
									obj:{
										num:789,
										t:"객체안의 객체",
										sub:(x,y) => x-y, //화살표함수
									}
								};

		//객체안의 변수(속성) 호출
		n	=	object.a + object.b;
		console.log(n);
		console.log(object.text);
		object.text = "좋은아침!!";
		console.log(object.text);

		//객체안의 변수(속성) 호출2		
		n = object["a"] + object["b"];
		console.log(n);


		//객체안의 함수(메서드) 호출
		object.outputText();
		n = object.sum(100,45);
		console.log(n);

		//객체안의 객체의 요소호출
		n = object.obj.num - 89;
		console.log(n);
		n = object.obj.sub(44,6);
		console.log(n);
		console.log(object.obj.t);
		
		//객체안에 새로운 변수(속성) 추가
		object.c = 14;
		console.log(object.c);

		//객체안의 새로운 함수(메서드) 추가
		object.mul = function(x,y){
			return x*y;
		}
		console.log(object.mul(5,5));

		//객체안에 변수와 함수 삭제
		delete object.b;
		console.log(object.b);
		delete object.outputText;
		object.outputText();
	

	</script>
</head>
<body>
	
</body>
</html>
