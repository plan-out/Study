<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12 수직정렬</title>
  <style>
    div{
      border:10px solid #000;
      font-size:100px;    
    }
    img{
      width:300px;
      vertical-align:baseline; }
    /*
      vertical-align: inline-block요소의 수직정렬위치 조정
      :baseline; (기본값)글자가 나열되는 라인에 맞추어 정렬.
      :top; 줄간격 기준하여 위에 정렬
      :bottom; 줄간격 기준하여 아래 정렬
      :text-top; 텍스트를 기준하여 위에 정렬
      :text-bottom; 텍스트를 기준하여 아래 정렬
      :middle; 텍스트의 가운데에 정렬됨.
      :sub; 아래첨자위치에 정렬됨.
      :super; 윗첨자위치에 정렬됨.
      :숫자px; 입력한 수치만큼 baseline에서 이동됨.
    */
  </style>
</head>
<body>
  <h2>vertical-align(수직정렬)</h2>
  <p>: inline-block요소에서만 적용되는 스타일</p>
  <div>abc <img src="짱구.png"> jpg <button>버튼</button></div>
</body>
</html>
