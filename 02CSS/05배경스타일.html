<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>05배경스타일</title>
	<style>
		body{
			height:2000px;
			background-color:#cff;											/*배경색상*/
			background-image:url("../HTML/자몽.jpg");	/*배경이미지*/
			background-repeat:no-repeat;							/*반복여부(p167)*/
			background-position:50% 0px;							/*배경위치(p169)*/
			background-attachment:fixed;							/*배치방법(p172)*/
			background-size:300px 200px;							/*크기조절(p175)*/
			
			/*
				background-origin:p178;
				background-clip: p180;
				= 잘 사용되지 않음.
			*/
			
			/*
			축약작성
			background:[색상] url("주소") [수평위치] [수직위치]/[너비] [높이] [반복여부] [배치];
			*/
				
			background:
				url("../레몬.png") 200px 200px no-repeat,
				url("../HTML/자몽.jpg") 100px 100px/300px auto no-repeat #ffc;
		}
	</style>
</head>
<body>
	<h1>배경스타일(p165)</h1>
	<style>
		h1{font-size:40px; color:#f00;}
	</style>
</body>
</html>
