<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>12폼요소학습하기</title>
</head>
<body>	
	<form action="상품검색 프로그램의 주소">
		<input type="text">
		<button>검색</button>
	</form>
	<h1>폼과 폼요소들(p67)</h1>
	<p>사용자가 웹페이지에서 데이타를 작성하고, 선택할 수 있게하고,
		작성된 데이타를 서버(프로그램)으로 전송시키는 요소</p>
	<div>
		<h3>회원가입</h3>
		<form action="입력한 데이타를 전송받을 프로그램 주소">
			<fieldset><!--폼요소의 그룹화-->
				<legend>기본정보</legend><!--그룹의 제목-->
				<label for="id">아이디 : </label><!--폼요소의 이름표-->
				<input type="text" id="id"/>
				<input type="button" value="중복확인"/>
				<br/>
				<label for="pw">비밀번호 : </label>
				<input type="password" id="pw"/>
				<br/>		
				<label for="re">비밀번호 확인 : </label>
				<input type="password" id="re"/>
				<br/>
				<label for="em">이메일 : </label>
				<input type="email" id="em" placeholder="예)ezen@naver.com"/>
				<select><!--선택목록상자-->
					<option>직접입력</option>
					<option>네이버</option>
					<option>구글</option>
					<option>카카오</option>
				</select>
			</fieldset>
			<fieldset>
				<legend>추가정보</legend>
				<p>성별</p>
				<label><input type="radio" name="gender"/>남자</label>
				<label><input type="radio" name="gender"/>여자</label>
				<p>관심분야</p>
				<label><input type="checkbox"/>독서</label>
				<label><input type="checkbox"/>여행</label>
				<label><input type="checkbox"/>영화</label>
				<label><input type="checkbox"/>운동</label>
				<label><input type="checkbox"/>음악</label>
			</fieldset>
			<input type="submit" value="회원가입"/>
			<input type="reset" value="취소"/>
		</form>
	</div>
</body>
</html>
